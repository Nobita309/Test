name: adblock

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sing-box (retry forever)
        run: |
          while true; do
            if curl -fsSL https://sing-box.app/install.sh | sh; then
              break
            fi
            echo "Retrying install sing-box..."
            sleep 2
          done

      - name: Generate rule-sets in parallel (oisd / pro / tif)
        run: |
          set -e

          gen() {
            URL="$1"
            OUT="$2"

            while true; do
              curl -fsSL "$URL" -o "${OUT}.txt" && break
              echo "Retrying $OUT..."
              sleep 2
            done

            sing-box rule-set convert --type adguard --output "${OUT}.srs" "${OUT}.txt"
            rm "${OUT}.txt"
            echo "Generated ${OUT}.srs"
          }

          gen "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/pro.txt" pro &
          gen "https://big.oisd.nl/domainswild" oisd &
          gen "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/tif.txt" tif &
          wait

      - name: Commit and push if there are changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.srs
          if ! git diff --staged --quiet; then
            git commit -m "Update adblock rule files"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Delete workflow runs older than 7 days
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          until OUTPUT=$(gh api repos/OWNER/REPO/commits/main --template '{{.commit.author.date}}' 2>/dev/null); do sleep 5; done
          date -d "$OUTPUT"
