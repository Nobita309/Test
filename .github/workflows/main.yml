name: adblock

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest sing-box version
        id: sbver
        run: |
          set -euo pipefail
          ver="$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Cache sing-box binary
        id: sbcache
        uses: actions/cache@v4
        with:
          path: .cache/sing-box/${{ steps.sbver.outputs.version }}/sing-box
          key: sing-box-${{ runner.os }}-${{ steps.sbver.outputs.version }}

      - name: Install sing-box (use cache if available)
        run: |
          set -euo pipefail
          VER="${{ steps.sbver.outputs.version }}"
          CACHED=".cache/sing-box/$VER/sing-box"

          if [ -f "$CACHED" ]; then
            sudo install -m 0755 "$CACHED" /usr/local/bin/sing-box
            sing-box version
            exit 0
          fi

          # cache miss: install đúng version latest hiện tại
          curl -fsSL https://sing-box.app/install.sh | sh -s -- --version "$VER"

          # lưu lại binary vào cache path
          mkdir -p ".cache/sing-box/$VER"
          cp -f "$(command -v sing-box)" "$CACHED"
          sing-box version

      - name: Generate rule-sets in parallel (oisd / pro / tif)
        run: |
          set -e

          gen() {
            URL="$1"
            OUT="$2"

            while true; do
              curl -fsSL "$URL" -o "${OUT}.txt" && break
              echo "Retrying $OUT..."
            done

            sing-box rule-set convert --type adguard --output "${OUT}.srs" "${OUT}.txt"
            rm "${OUT}.txt"
            echo "Generated ${OUT}.srs"
          }

          gen "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/pro.txt" pro &
          gen "https://big.oisd.nl/domainswild" oisd &
          gen "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/tif.txt" tif &
          wait

      - name: Commit and push if there are changes
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add *.srs || true

          if ! git diff --staged --quiet; then
            git commit -m "Update adblock rule files"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Delete previous workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs" \
            | jq -r '.workflow_runs[] | select(.status == "completed") | .id')

          for run_id in $PREVIOUS_RUNS; do
            echo "Deleting workflow run ID: $run_id"
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
          done
